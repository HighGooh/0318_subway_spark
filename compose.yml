services:
  web-main:
    image: nginx:1.28
    container_name: web-main
    ports:
      - 80:80
    volumes:
      - ./config:/etc/nginx/conf.d:ro
      - ./main:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - spark-network

  frontend:
    image: nginx:1.28
    container_name: frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/config:/etc/nginx/conf.d:ro
    networks:
      - spark-network      

  backend:
    image: uv:2
    container_name: backend
    volumes:
      - ./backend:/workspace
    command: ["uv", "run", "fastapi", "run", "--proxy-headers", "--forwarded-allow-ips", "'*'"]
    networks:
      - spark-network      

  spark-master:
    image: apache/spark:4.1.1-java21-python3
    container_name: spark-master
    user: root
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
    networks:
      - spark-network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker-1:
    image: apache/spark:4.1.1-java21-python3
    container_name: spark-worker-1
    user: root
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    volumes:
      - spark-work-1:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - spark-network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  spark-worker-2:
    image: apache/spark:4.1.1-java21-python3
    container_name: spark-worker-2
    user: root
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    volumes:
      - spark-work-2:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - spark-network
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  n8n_ai_agent:
    image: docker.n8n.io/n8nio/n8n:2.7.3
    container_name: n8n_ai_agent
    environment:
      # - N8N_PATH=/n8n/
      - N8N_HOST=aiedu.tplinkdns.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      # - WEBHOOK_URL=http://n8n_ai_agent:5678
      - WEBHOOK_URL=http://aiedu.tplinkdns.com:7240/n8n/
      - N8N_SECURE_COOKIE=false
      - TZ=Asia/Seoul
      - GENERIC_TIMEZONE=Asia/Seoul
      - LC_ALL=en_US.UTF-8
    ports:
      - 8001:5678
    volumes:
      - n8n_storage:/home/node/.n8n
    networks:
      - spark-network

  n8n_postgres:
    image: postgres:18.3
    container_name: n8n_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - TZ=Asia/Seoul
    # volumes:
    #   - ./n8n/postgres:/var/lib/postgresql/18/main
    networks:
      - spark-network

  db:
    image: mariadb:12.1.2
    container_name: db
    environment:
      - MARIADB_HOST=localhost
      - MARIADB_PORT=3306
      - MARIADB_ROOT_PASSWORD=1234
      # - MARIADB_DATABASE=edu
      - TZ=Asia/Seoul
      - LC_ALL:en_US.UTF-8
    volumes:
      - data-mariadb:/var/lib/mysql:rw
    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge

volumes:
  spark-work-1:
  spark-work-2:
  n8n_storage:
  data-mariadb:
    external: true